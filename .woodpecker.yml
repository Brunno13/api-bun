when:
  - event: push
    branch: main
  - event: tag

clone:
  git:
    image: woodpeckerci/plugin-git
    extra_hosts:
      - "gitea.brunnoserver.duckdns.org:192.168.31.215"

steps:
  # =========================================================
  # FASE 1: Testes e Build
  # =========================================================
  - name: testar-codigo
    image: oven/bun:alpine
    commands:
      - echo "Instalando dependências para os testes..."
      - bun install
      - echo "Executando a suíte de testes..."
      - bun test

  # Otimização: Agora este passo só roda quando uma TAG é criada
  - name: build-executaveis
    image: oven/bun:alpine
    commands:
      - echo "Criando diretório para os binários..."
      #- mkdir -p ./bin
      
      - echo "Compilando executáveis standalone (Linux, Windows, MacOS)..."
      # Redirecionamos o --outfile para a nova pasta ./bin
      - bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile=./HDD4TB/torrent/api-bun-linux
      - bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile=./HDD4TB/torrent/api-bun-windows.exe
      - bun build ./src/index.ts --compile --target=bun-darwin-x64 --outfile=./HDD4TB/torrent/api-bun-macos
    when:
      - event: tag

  - name: build-imagem-docker
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Atualizando a imagem Docker api-bun:latest..."
      - docker build -t api-bun:latest .

  # =========================================================
  # FASE 2: Staging (Roda APENAS no push para a branch main)
  # =========================================================
  - name: deploy-staging
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINER_NAME: api-bun-staging
      APP_PORT:
        from_secret: staging_app_port
      HOST_DATA_PATH:
        from_secret: staging_host_data_path
      BETTER_AUTH_URL:
        from_secret: staging_better_auth_url
      BETTER_AUTH_SECRET:
        from_secret: staging_better_auth_secret
      OTEL_EXPORTER_URL:
        from_secret: staging_otel_exporter_url
    commands:
      - echo "Subindo o ambiente de Homologação via Docker Compose..."
      - docker compose -p api-bun-staging up -d
    when:
      - event: push
        branch: main

  # =========================================================
  # FASE 3: Produção (Roda APENAS quando uma Tag de versão é criada)
  # =========================================================
  - name: gerar-release-notes
    image: alpine
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - apk add --no-cache curl git jq
      - |
        git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
        git fetch --all --unshallow || git fetch --all
        git fetch --tags
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %h %s")
        else
          CHANGELOG=$(git log --pretty=format:"- %h %s" $PREV_TAG..HEAD)
        fi
        
        JSON_PAYLOAD=$(jq -n --arg tag "${CI_COMMIT_TAG}" --arg name "Versão ${CI_COMMIT_TAG}" --arg body "🚀 Deploy automático realizado com sucesso pelo Woodpecker CI. 

        ---

        ### 🔄 Histórico de Commits
        $CHANGELOG" '{tag_name: $tag, name: $name, body: $body}')
        
        RESPONSE=$(curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" -H "accept: application/json" -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" -d "$JSON_PAYLOAD")
        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
        
        # Ajustamos o caminho dos arquivos (attachment=@./bin/...) para buscar na nova pasta
        curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-linux" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-linux"
        curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-windows.exe" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-windows.exe"
        curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-macos" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-macos"
    when:
      - event: tag

  - name: deploy-producao
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINER_NAME: api-bun-prod
      APP_PORT:
        from_secret: prod_app_port
      HOST_DATA_PATH:
        from_secret: prod_host_data_path
      BETTER_AUTH_URL:
        from_secret: prod_better_auth_url
      BETTER_AUTH_SECRET:
        from_secret: prod_better_auth_secret
      OTEL_EXPORTER_URL:
        from_secret: prod_otel_exporter_url
    commands:
      - echo "Subindo o ambiente de Produção Oficial via Docker Compose..."
      - docker compose -p api-bun-producao up -d
    when:
      - event: tag