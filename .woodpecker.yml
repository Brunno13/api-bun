steps:
  - name: deploy-elysia
    image: docker:cli
    volumes:
      # Dá acesso ao Docker Host da Orange Pi para gerenciar o container
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Iniciando build da API Elysia..."
      - docker build -t api-bun:latest .

      - echo "Limpando versão anterior..."
      - docker stop api-bun || true
      - docker rm api-bun || true

      - echo "Subindo o novo servidor Elysia..."
      # Mapeia a porta 3000 (interna do Elysia) para a 3003 (externa da Orange Pi)
      - docker run -d --name api-bun -p 3003:3000 --restart unless-stopped api-bun:latest

      - echo "Deploy concluído com sucesso!"
    when:
      event: push
      branch: main
