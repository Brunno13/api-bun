when:
  - event: push
    branch: main
  - event: tag

clone:
  git:
    image: woodpeckerci/plugin-git
    extra_hosts:
      - "gitea.brunnoserver.duckdns.org:192.168.31.215"

steps:
  # =========================================================
  # FASE 1: Testes e Build
  # =========================================================
  - name: testar-codigo
    image: oven/bun:alpine
    commands:
      - echo "Instalando dependências para os testes..."
      - bun install
      - echo "Executando a suíte de testes existente..."
      - bun test

  # NOVO: Passo que chama a LLM Local (Roda após os testes originais passarem)
  - name: bot-testes-ia
    image: oven/bun:alpine
    environment:
      LOCAL_LLM_URL:
        from_secret: local_llm_url
      LOCAL_LLM_MODEL:
        from_secret: local_llm_model
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - echo "Acordando o AI Bot Local..."
      - apk add --no-cache git
      - bun run scripts/ai-test-gen.ts
    when:
      - event: push
        branch: main

  - name: build-executaveis
    image: oven/bun:alpine
    commands:
      - echo "Criando diretório para os binários..."
      - mkdir -p ./bin
      
      - echo "Compilando executáveis standalone (Linux, Windows, MacOS)..."
      - bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile=./bin/api-bun-linux
      - bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile=./bin/api-bun-windows.exe
      - bun build ./src/index.ts --compile --target=bun-darwin-x64 --outfile=./bin/api-bun-macos
    when:
      - event: tag

  - name: build-imagem-docker
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Atualizando a imagem Docker api-bun:latest..."
      - docker build -t api-bun:latest .

  # =========================================================
  # FASE 2: Staging (Roda APENAS no push para a branch main)
  # =========================================================
  - name: deploy-staging
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINER_NAME: api-bun-staging
      APP_PORT:
        from_secret: staging_app_port
      HOST_DATA_PATH:
        from_secret: staging_host_data_path
      BETTER_AUTH_URL:
        from_secret: staging_better_auth_url
      BETTER_AUTH_SECRET:
        from_secret: staging_better_auth_secret
      OTEL_EXPORTER_URL:
        from_secret: staging_otel_exporter_url
    commands:
      - echo "Subindo o ambiente de Homologação via Docker Compose..."
      - docker compose -p api-bun-staging up -d
    when:
      - event: push
        branch: main

  # =========================================================
  # FASE 3: Produção (Roda APENAS quando uma Tag de versão é criada)
  # =========================================================
  - name: gerar-release-notes
    image: alpine
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - apk add --no-cache curl git jq
      - |
        set -e
        set -x
        
        git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
        git fetch --all --unshallow || git fetch --all
        git fetch --tags
        
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %h %s")
        else
          CHANGELOG=$(git log --pretty=format:"- %h %s" $PREV_TAG..HEAD)
        fi
        
        RELEASE_BODY="🚀 Deploy automático realizado com sucesso pelo Woodpecker CI. 
        
        ---
        
        ### 🔄 Histórico de Commits
        $CHANGELOG"
        
        echo "$RELEASE_BODY" > .release_body.txt
        
        JSON_PAYLOAD=$(jq -n --arg tag "${CI_COMMIT_TAG}" --arg name "Versão ${CI_COMMIT_TAG}" --arg body "$RELEASE_BODY" '{tag_name: $tag, name: $name, body: $body}')
        
        echo "=== ENVIANDO RELEASE PARA O GITEA ==="
        RESPONSE=$(curl -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases" -H "accept: application/json" -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" -d "$JSON_PAYLOAD")
        
        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
        
        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          echo "❌ ERRO: O Gitea não retornou um ID válido."
          exit 1
        fi
        
        echo "=== INICIANDO UPLOAD DOS ANEXOS ==="
        curl -f -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-linux" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-linux"
        curl -f -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-windows.exe" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-windows.exe"
        curl -f -s -X POST "http://192.168.31.215:3099/api/v1/repos/${CI_REPO_OWNER}/${CI_REPO_NAME}/releases/$RELEASE_ID/assets?name=api-bun-macos" -H "Authorization: token $GITEA_TOKEN" -F "attachment=@./bin/api-bun-macos"
    when:
      - event: tag

  - name: espelhar-github
    image: alpine/git
    environment:
      GITHUB_USER: Brunno13
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo "=== SINCRONIZANDO COM O GITHUB ==="
      - git config --global --add safe.directory '*'
      - git remote add github https://$GITHUB_USER:$GITHUB_TOKEN@github.com/$GITHUB_USER/api-bun.git
      - git push github main --force
      - git push github ${CI_COMMIT_TAG} --force
    when:
      - event: tag

  - name: criar-release-github
    image: alpine
    environment:
      GITHUB_USER: Brunno13
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache curl jq
      - |
        set -e
        echo "=== CRIANDO RELEASE NO GITHUB ==="
        GITHUB_API_URL="https://api.github.com/repos/$GITHUB_USER/api-bun/releases"
        
        if [ -f .release_body.txt ]; then
          RELEASE_BODY=$(cat .release_body.txt)
        else
          RELEASE_BODY="🚀 Lançamento automatizado sincronizado a partir do servidor Gitea interno."
        fi
        
        JSON_PAYLOAD=$(jq -n --arg tag "${CI_COMMIT_TAG}" --arg name "Versão ${CI_COMMIT_TAG}" --arg body "$RELEASE_BODY" '{tag_name: $tag, name: $name, body: $body}')
        
        RESPONSE=$(curl -s -X POST $GITHUB_API_URL -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GITHUB_TOKEN" -d "$JSON_PAYLOAD")
        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
        
        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          exit 1
        fi
        
        echo "=== INICIANDO UPLOAD DOS ANEXOS NO GITHUB ==="
        GH_UPLOAD_URL="https://uploads.github.com/repos/$GITHUB_USER/api-bun/releases/$RELEASE_ID/assets"
        
        curl -f -s -X POST "$GH_UPLOAD_URL?name=api-bun-linux" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"./bin/api-bun-linux"
        curl -f -s -X POST "$GH_UPLOAD_URL?name=api-bun-windows.exe" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"./bin/api-bun-windows.exe"
        curl -f -s -X POST "$GH_UPLOAD_URL?name=api-bun-macos" -H "Authorization: Bearer $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"./bin/api-bun-macos"
    when:
      - event: tag

  - name: deploy-producao
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINER_NAME: api-bun-prod
      APP_PORT:
        from_secret: prod_app_port
      HOST_DATA_PATH:
        from_secret: prod_host_data_path
      BETTER_AUTH_URL:
        from_secret: prod_better_auth_url
      BETTER_AUTH_SECRET:
        from_secret: prod_better_auth_secret
      OTEL_EXPORTER_URL:
        from_secret: prod_otel_exporter_url
    commands:
      - echo "Subindo o ambiente de Produção Oficial via Docker Compose..."
      - docker compose -p api-bun-producao up -d
    when:
      - event: tag